            - generic [ref=e27]:
                - heading "Your deck IS your band" [level=3] [ref=e28]
                - paragraph [ref=e29]: Inscriptions, labels, and Glory are written on the cards themselves. Every game leaves marks the next wizard inherits.
            - generic [ref=e30]:
                - heading "Six bosses, one dungeon" [level=3] [ref=e31]
                - paragraph [ref=e32]: Wizards pool their Monster cards and fight 6 sequential bosses. The wizard who lands the killing blow takes the coppers.
            - generic [ref=e33]:
                - heading "Cooperate. Then betray." [level=3] [ref=e34]
                - paragraph [ref=e35]: Spike, Foil, Snipe, and Brace let you tip the scales — or steal the kill. Tactics cost cards, not coins.
        - generic [ref=e38]:
            - heading "What you need" [level=2] [ref=e39]
            - list [ref=e40]:
                - listitem [ref=e41]: 1 standard deck of playing cards with both Jokers (54 cards)
                - listitem [ref=e42]: A fine-point Sharpie
                - listitem [ref=e43]: 1 sheet of Avery 18294 labels
                - listitem [ref=e44]: ~30 pennies per wizard for Coppers
                - listitem [ref=e45]: A d20 for HP, a d6 for round counting
            - link "Get the Rules & Sheets" [ref=e47] [cursor=pointer]:
