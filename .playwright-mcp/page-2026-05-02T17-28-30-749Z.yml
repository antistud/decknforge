      - generic [ref=e63]:
        - heading "A round, in 9 steps" [level=2] [ref=e64]
        - list [ref=e65]:
          - listitem [ref=e66]:
            - strong [ref=e67]: Plot.
            - text: Every wizard plays 1 card face-down.
          - listitem [ref=e68]:
            - strong [ref=e69]: Reveal.
            - text: All cards flip simultaneously.
          - listitem [ref=e70]:
            - strong [ref=e71]: Tactics.
            - text: Each wizard, clockwise from the active wizard, may take ONE Tactic — paid by discarding cards.
          - listitem [ref=e72]:
            - strong [ref=e73]: Damage.
            - text: Sum revealed values + inscription effects. Apply to the Boss. All revealed cards are
            - emphasis [ref=e74]: committed
            - text: for the rest of the dungeon.
          - listitem [ref=e75]:
            - strong [ref=e76]: Killing blow.
            - text: If Boss HP ≤ 0, the wizard with the highest revealed face value takes the kill (suit tiebreak ♠ > ♥ > ♣ > ♦).
          - listitem [ref=e77]:
            - strong [ref=e78]: Boss attack.
            - text: Boss deals ATK to all wizards. Take it, or commit cards summing to
            - emphasis [ref=e79]: strictly more
            - text: than ATK to dodge.
          - listitem [ref=e80]:
            - strong [ref=e81]: Pressure check.
            - text: If 0 damage was dealt this round, ALL wizards take 2.
          - listitem [ref=e82]:
            - strong [ref=e83]: Minions strike.
            - text: Active Minions attack each wizard.
          - listitem [ref=e84]:
            - strong [ref=e85]: Refill.
            - text: Each wizard draws up to 2 (capped at 12-card hand).
